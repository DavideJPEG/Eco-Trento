<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECOTN Login</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#1e1e2f;
    }

    .container{
        width:350px;
        background:#fff;
        padding:30px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .tabs{
        display:flex;
        margin-bottom:20px;
    }

    .tabs button{
        flex:1;
        padding:12px;
        border:none;
        cursor:pointer;
        background:#ddd;
        font-size:16px;
        transition:0.3s;
    }

    .tabs button.active{
        background:#4a6cf7;
        color:white;
        font-weight:bold;
    }

    .form{
        display:none;
        flex-direction:column;
    }

    .form.active{
        display:flex;
    }

    h1{
        margin-bottom:20px;
        text-align: center;
        font-size: 40px;
    }

    .form h2{
        margin-bottom:20px;
        text-align:center;
        color:#333;
    }

    .form input{
        margin-bottom:15px;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:14px;
    }

    .form button{
        padding:12px;
        border:none;
        border-radius:8px;
        background:#4a6cf7;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .form button:hover{
        background:#3555d3;
    }

   a.button{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px 20px;
    background:white;
    color:#4a6cf7;
    text-decoration:underline;
    border-radius:8px;
    transition:0.3s;
    margin-top:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>ECOTRENTO</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showForm('login')">Login</button>
        <button class="tab-btn" onclick="showForm('register')">Registrati</button>
    </div>

    <!-- LOGIN -->
    <form class="form active" id="login">
        
        <h2>Accesso</h2>

        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Accedi</button>
    </form>

    <!-- REGISTRAZIONE -->
    <form class="form" id="register">

        <h2>Registrazione</h2>

        <input type="text" placeholder="Nome utente" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Registrati</button>
    </form>

    <a class="button" href="main.html">Vai alla Home</a>

</div>

<script>
    function showForm(formId){

        // Nasconde tutti i form
        document.querySelectorAll('.form').forEach(form => {
            form.classList.remove('active');
        });

        // Rimuove active dai bottoni
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        // Mostra il form selezionato
        document.getElementById(formId).classList.add('active');

        // Attiva il bottone corretto
        event.target.classList.add('active');
    }
</script>

</body>
</html>
